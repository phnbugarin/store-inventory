<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RC Paint Trading</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-bg: #F5F5F7;
            --apple-card: rgba(255, 255, 255, 0.7);
            --apple-text: #1D1D1F;
            --apple-secondary: #86868B;
            --apple-border: rgba(210, 210, 215, 0.5);
            --apple-red: #FF3B30;
            --apple-green: #34C759;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            margin: 0;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 1000px; padding: 40px 20px; }

        .card {
            background: var(--apple-card);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 22px;
            border: 1px solid var(--apple-border);
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            margin-bottom: 24px;
        }

        h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.6px; margin: 0 0 4px 0; }
        .subtitle { color: var(--apple-secondary); margin-bottom: 24px; font-size: 16px; }

        .scan-terminal { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: start; }
        
        input[type="text"], select {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border: 1px solid var(--apple-border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.6);
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        input:focus { background: #FFF; border-color: var(--apple-blue); box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1); }

        /* Activity Feed with Scroll */
        .activity-label { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--apple-secondary); margin-bottom: 12px; display: block; }
        .activity-feed { 
            height: 220px; 
            overflow-y: auto; 
            padding-right: 8px;
        }
        /* Custom Scrollbar */
        .activity-feed::-webkit-scrollbar { width: 6px; }
        .activity-feed::-webkit-scrollbar-thumb { background: var(--apple-border); border-radius: 10px; }

        .activity-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: white;
            border-radius: 14px;
            margin-bottom: 8px;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .actions { display: flex; gap: 10px; align-items: center; }
        .undo-link { color: var(--apple-secondary); font-weight: 500; cursor: pointer; font-size: 12px; }
        .resolve-link { color: var(--apple-blue); font-weight: 600; cursor: pointer; font-size: 12px; }
        .error-text { color: var(--apple-red); font-weight: 700; }

        /* Table & Search */
        .table-header-ctrl { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { text-align: center; padding: 12px; font-size: 11px; color: var(--apple-secondary); font-weight: 700; border-bottom: 1px solid var(--apple-border); text-transform: uppercase; }
        td { padding: 16px 10px; border-bottom: 1px solid var(--apple-border); text-align: center; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .col-name { width: 40%; text-align: left; font-weight: 600; }
        .active-num { color: var(--apple-blue); font-weight: 700; background: rgba(0, 122, 255, 0.05); border-radius: 8px; }

        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        button { padding: 12px 20px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--apple-blue); color: white; flex: 1; }
        .btn-alt { background: #E8E8ED; color: var(--apple-text); }

        #dropzone { border: 2px dashed var(--apple-border); border-radius: 20px; padding: 100px 20px; text-align: center; cursor: pointer; }
        .hidden { display: none; }

        /* Modal for manual fix */
        #resolveModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            z-index: 100; width: 400px;
        }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); z-index: 99; }
    </style>
</head>
<body>

<div class="container">
    <div id="setupBox" class="card">
        <h1>RC Paint Trading</h1>
        <p class="subtitle">Upload your master inventory list.</p>
        <div id="dropzone" onclick="document.getElementById('excelUpload').click()">
            <p style="font-weight: 500; color: var(--apple-blue);">Select Excel Spreadsheet</p>
        </div>
        <input type="file" id="excelUpload" class="hidden" accept=".xlsx">
    </div>

    <div id="mainDashboard" class="hidden">
        <div class="card">
            <div class="scan-terminal">
                <div>
                    <h1>Scanner</h1>
                    <p class="subtitle">Ready for input...</p>
                    <input type="text" id="barcodeInput" placeholder="Scan barcode..." autofocus>
                    <div class="btn-row">
                        <button class="btn-main" onclick="exportResults()">Export</button>
                        <button class="btn-alt" onclick="location.reload()">Reset</button>
                    </div>
                </div>
                <div>
                    <span class="activity-label">Scan History</span>
                    <div class="activity-feed" id="activityFeed"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="table-header-ctrl">
                <h3 style="margin:0">Inventory Matrix</h3>
                <input type="text" id="tableSearch" placeholder="Search products..." style="width: 250px; padding: 8px 12px;">
            </div>
            <table>
                <thead>
                    <tr>
                        <th class="col-name">Product Name</th>
                        <th>1/4 L</th>
                        <th>1 L</th>
                        <th>1 Gallon</th>
                        <th>Pail</th>
                    </tr>
                </thead>
                <tbody id="matrixBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalContainer" class="hidden">
    <div class="overlay" onclick="closeModal()"></div>
    <div id="resolveModal">
        <h3 style="margin-top:0">Resolve Unknown Scan</h3>
        <p id="unknownDisplay" style="font-family: monospace; background: #eee; padding: 10px; border-radius: 8px;"></p>
        <label class="activity-label">Assign to Product</label>
        <select id="productSelect"></select>
        <br><br>
        <label class="activity-label">Select Size</label>
        <select id="sizeSelect">
            <option value="1/4 L">1/4 L</option>
            <option value="1 L">1 L</option>
            <option value="1 Gallon">1 Gallon</option>
            <option value="1 Pail">Pail</option>
        </select>
        <div class="btn-row" style="margin-top:25px;">
            <button class="btn-main" onclick="applyResolution()">Confirm</button>
            <button class="btn-alt" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    let productMatrix = [];
    let history = [];
    let pendingResolveIndex = null;

    const input = document.getElementById('barcodeInput');
    const searchInput = document.getElementById('tableSearch');
    const feed = document.getElementById('activityFeed');

    // Excel Processing
    document.getElementById('excelUpload').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet);

            productMatrix = json.map(row => ({
                name: row.Name || row.name || "Unnamed Item",
                codes: {
                    "1/4 L": String(row["BC_1/4L"] || "").trim(),
                    "1 L": String(row["BC_1L"] || "").trim(),
                    "1 Gallon": String(row["BC_1G"] || "").trim(),
                    "1 Pail": String(row["BC_Pail"] || "").trim()
                },
                counts: { "1/4 L": 0, "1 L": 0, "1 Gallon": 0, "1 Pail": 0 }
            })).filter(p => p.name);

            document.getElementById('setupBox').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            populateSelect();
            updateUI();
            input.focus();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    // Barcode Input
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const code = input.value.trim();
            if (!code) return;

            let match = false;
            productMatrix.forEach(p => {
                for (let size in p.codes) {
                    if (p.codes[size] === code && code !== "") {
                        p.counts[size]++;
                        history.unshift({ name: p.name, size: size, timestamp: Date.now(), error: false });
                        match = true;
                    }
                }
            });

            if (!match) history.unshift({ name: "Unknown Barcode", size: code, error: true });
            
            input.value = '';
            updateUI();
        }
    });

    // Search Filter
    searchInput.addEventListener('input', updateUI);

    function updateUI() {
        const searchTerm = searchInput.value.toLowerCase();

        // Update Table
        document.getElementById('matrixBody').innerHTML = productMatrix
            .filter(p => p.name.toLowerCase().includes(searchTerm))
            .map(p => `
                <tr>
                    <td class="col-name">${p.name}</td>
                    <td class="${p.counts["1/4 L"] > 0 ? 'active-num' : ''}">${p.counts["1/4 L"]}</td>
                    <td class="${p.counts["1 L"] > 0 ? 'active-num' : ''}">${p.counts["1 L"]}</td>
                    <td class="${p.counts["1 Gallon"] > 0 ? 'active-num' : ''}">${p.counts["1 Gallon"]}</td>
                    <td class="${p.counts["1 Pail"] > 0 ? 'active-num' : ''}">${p.counts["1 Pail"]}</td>
                </tr>
            `).join('');

        // Update Feed
        if (history.length === 0) {
            feed.innerHTML = `<p style="color: #bbb; text-align: center; padding-top: 80px; font-size: 13px;">No scans yet</p>`;
            return;
        }

        feed.innerHTML = history.map((item, index) => `
            <div class="activity-item">
                <span style="max-width: 65%; overflow: hidden;">
                    <strong class="${item.error ? 'error-text' : ''}">${item.name}</strong><br>
                    <small style="color:var(--apple-secondary)">${item.size}</small>
                </span>
                <div class="actions">
                    ${item.error ? `<span class="resolve-link" onclick="openResolve(${index})">Resolve</span>` : ''}
                    <span class="undo-link" onclick="undo(${index})">Undo</span>
                </div>
            </div>
        `).join('');
    }

    function undo(index) {
        const item = history[index];
        if (!item.error) {
            const p = productMatrix.find(p => p.name === item.name);
            if (p) p.counts[item.size]--;
        }
        history.splice(index, 1);
        updateUI();
    }

    // Resolution Logic
    function populateSelect() {
        const select = document.getElementById('productSelect');
        select.innerHTML = productMatrix.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
    }

    function openResolve(index) {
        pendingResolveIndex = index;
        document.getElementById('unknownDisplay').innerText = `Barcode: ${history[index].size}`;
        document.getElementById('modalContainer').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('modalContainer').classList.add('hidden');
        pendingResolveIndex = null;
    }

    function applyResolution() {
        const productName = document.getElementById('productSelect').value;
        const size = document.getElementById('sizeSelect').value;
        
        const product = productMatrix.find(p => p.name === productName);
        if (product) {
            product.counts[size]++;
            // Update history item
            history[pendingResolveIndex] = {
                name: productName,
                size: size,
                timestamp: Date.now(),
                error: false
            };
        }
        closeModal();
        updateUI();
    }

    function exportResults() {
        const data = productMatrix.map(p => ({
            "Product": p.name,
            "1/4L": p.counts["1/4 L"],
            "1L": p.counts["1 L"],
            "1 Gallon": p.counts["1 Gallon"],
            "Pail": p.counts["1 Pail"]
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Inventory");
        XLSX.writeFile(wb, "HeraPrint_Inventory_Export.xlsx");
    }

    // New Voice Synthesis Function
    function speakScan(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // Stop current speech to start new one immediately
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.1; 
            utterance.pitch = 1.0;
            window.speechSynthesis.speak(utterance);
        }
    }

    // Barcode Input with "Error" Voice Feedback
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const code = input.value.trim();
            if (!code) return;

            let match = false;
            productMatrix.forEach(p => {
                for (let size in p.codes) {
                    if (p.codes[size] === code && code !== "") {
                        p.counts[size]++;
                        history.unshift({ name: p.name, size: size, timestamp: Date.now(), error: false });
                        
                        // Success Speech: "Product Name, Size"
                        speakScan(`${p.name}, ${size}`);
                        
                        // Visual Success (Green flash)
                        input.style.borderColor = "var(--apple-green)";
                        setTimeout(() => input.style.borderColor = "", 400);
                        
                        match = true;
                    }
                }
            });

            if (!match) {
                history.unshift({ name: "Unknown Barcode", size: code, error: true });
                
                // Error Speech: "Error. Unknown Barcode."
                speakScan("Error. Unknown Barcode.");
                
                // Visual Error (Red flash and shake)
                input.style.borderColor = "var(--apple-red)";
                input.style.backgroundColor = "rgba(255, 59, 48, 0.05)";
                setTimeout(() => {
                    input.style.borderColor = "";
                    input.style.backgroundColor = "";
                }, 600);
            }
            
            input.value = '';
            updateUI();
        }
    });

    // Barcode Input with Visual Feedback
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const code = input.value.trim();
            if (!code) return;

            let match = false;
            productMatrix.forEach(p => {
                for (let size in p.codes) {
                    if (p.codes[size] === code && code !== "") {
                        p.counts[size]++;
                        history.unshift({ name: p.name, size: size, timestamp: Date.now(), error: false });
                        
                        // Audio Feedback
                        speakScan(`${p.name}, ${size}`);
                        
                        // Visual Feedback (Flash green)
                        input.style.backgroundColor = "rgba(52, 199, 89, 0.2)";
                        setTimeout(() => input.style.backgroundColor = "", 300);
                        
                        match = true;
                    }
                }
            });

            if (!match) {
                history.unshift({ name: "Unknown Barcode", size: code, error: true });
                speakScan("Unknown Barcode");
                
                // Visual Feedback (Flash red)
                input.style.backgroundColor = "rgba(255, 59, 48, 0.2)";
                setTimeout(() => input.style.backgroundColor = "", 300);
            }
            
            input.value = '';
            updateUI();
        }
    });

    // Update the input event listener logic:
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const code = input.value.trim();
            if (!code) return;

            let match = false;
            productMatrix.forEach(p => {
                for (let size in p.codes) {
                    if (p.codes[size] === code && code !== "") {
                        p.counts[size]++;
                        history.unshift({ name: p.name, size: size, timestamp: Date.now(), error: false });
                        
                        // VOICE FEEDBACK FOR SUCCESS
                        speakScan(`${p.name}, ${size}`);
                        
                        match = true;
                    }
                }
            });

            if (!match) {
                history.unshift({ name: "Unknown Barcode", size: code, error: true });
                // VOICE FEEDBACK FOR ERROR
                speakScan("Unknown Barcode");
            }
            
            input.value = '';
            updateUI();
        }
    });
</script>
</body>
</html>
