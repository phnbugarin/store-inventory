<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RC Paint Trading - Pro Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-bg: #F5F5F7;
            --apple-card: rgba(255, 255, 255, 0.8);
            --apple-text: #1D1D1F;
            --apple-secondary: #86868B;
            --apple-border: rgba(210, 210, 215, 0.5);
            --apple-red: #FF3B30;
            --apple-green: #34C759;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            margin: 0;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 1200px; padding: 20px; margin: 0 auto; }

        .card {
            background: var(--apple-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--apple-border);
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        h1 { font-size: 22px; font-weight: 700; margin: 0 0 5px 0; }
        
        /* Responsive Grid */
        .scan-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            align-items: stretch; /* Forces both cards to same height */
            margin-bottom: 20px;
        }

        /* History Feed - Responsive Height */
        .history-container {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .activity-feed { 
            flex-grow: 1; /* Fills all available space in the card */
            overflow-y: auto; 
            background: rgba(0,0,0,0.02);
            border-radius: 12px;
            padding: 10px;
        }

        .activity-item {
            background: #fff;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        /* Inputs */
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--apple-border);
            font-size: 16px;
            background: #fff;
        }

        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; }

        .btn-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        button { padding: 10px 15px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 12px; }
        .btn-main { background: var(--apple-blue); color: #fff; }
        .btn-cam { background: var(--apple-green); color: #fff; }
        .btn-alt { background: #E8E8ED; color: var(--apple-text); }
        .btn-resolve { background: #FF9500; color: white; }

        /* Resolution Modal */
        #resolveModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }

        .hidden { display: none; }
        .active-num { color: var(--apple-blue); font-weight: 700; background: rgba(0, 122, 255, 0.08); border-radius: 6px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 11px; color: var(--apple-secondary); padding: 10px; border-bottom: 1px solid var(--apple-border); }
        td { padding: 10px; border-bottom: 1px solid var(--apple-border); font-size: 13px; }

        @media (max-width: 768px) { .scan-grid { grid-template-columns: 1fr; } .activity-feed { height: 300px; } }
    </style>
</head>
<body>

<div class="container">
    <div id="setupBox" class="card">
        <h1>RC Paint Trading</h1>
        <div id="dropzone" style="border: 2px dashed var(--apple-border); padding: 40px; text-align: center; border-radius: 20px;" onclick="document.getElementById('excelUpload').click()">
            <p style="color: var(--apple-blue); font-weight: 600;">Upload Inventory Excel</p>
        </div>
        <input type="file" id="excelUpload" class="hidden" accept=".xlsx">
    </div>

    <div id="mainDashboard" class="hidden">
        <div class="scan-grid">
            <div class="card" id="leftCard">
                <h1>Terminal</h1>
                <div id="status" style="font-size:10px; margin-bottom:10px; color: var(--apple-green);">● READY FOR HARDWARE</div>
                
                <div id="reader" class="hidden" style="margin-bottom:10px;"></div>
                
                <input type="text" id="barcodeInput" 
                       placeholder="Scan here..." 
                       inputmode="none" 
                       autocomplete="off">

                <div class="btn-row">
                    <button id="camToggleBtn" class="btn-cam" onclick="toggleCamera()">Use Camera</button>
                    <button class="btn-alt" onclick="forceFocus()">Reset Focus</button>
                    <button class="btn-main" onclick="exportResults()">Export</button>
                </div>
            </div>

            <div class="card history-container">
                <span style="font-size: 11px; font-weight: 700; color: var(--apple-secondary); margin-bottom: 10px;">RECENT SCANS</span>
                <div class="activity-feed" id="activityFeed"></div>
            </div>
        </div>

        <div class="card">
            <input type="text" id="tableSearch" placeholder="Search products..." style="margin-bottom:15px;">
            <table>
                <thead>
                    <tr><th>Product</th><th>1/4 L</th><th>1 L</th><th>1 Gal</th><th>Pail</th></tr>
                </thead>
                <tbody id="matrixBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="resolveModal">
    <div class="modal-content">
        <h3>Resolve Unknown Barcode</h3>
        <p id="unknownDisplay" style="font-family: monospace; background: #eee; padding: 5px;"></p>
        <input type="text" id="modalSearch" placeholder="Search product to assign..." oninput="filterResolveList()">
        <div id="resolveList" style="margin-top:15px;"></div>
        <button class="btn-alt" style="width:100%; margin-top:10px;" onclick="closeResolve()">Cancel</button>
    </div>
</div>

<script>
    let productMatrix = [];
    let history = [];
    let isCameraRunning = false;
    let html5QrCode = null;
    let pendingResolveIndex = null;

    const input = document.getElementById('barcodeInput');
    const feed = document.getElementById('activityFeed');

    // --- 1. Keyboard & Focus Control ---
    function forceFocus() {
        input.focus();
        // Prevent iPad keyboard even if clicked
        input.setAttribute('readonly', 'readonly');
        setTimeout(() => { input.removeAttribute('readonly'); }, 100);
    }

    // Auto-focus every 3 seconds if not in camera mode
    setInterval(() => { if(!isCameraRunning) input.focus(); }, 3000);

    // --- 2. Data Logic ---
    document.getElementById('excelUpload').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            productMatrix = XLSX.utils.sheet_to_json(sheet).map(row => ({
                name: row.Name || row.name || "Unknown",
                codes: {
                    "1/4 L": String(row["BC_1/4L"] || "").trim(),
                    "1 L": String(row["BC_1L"] || "").trim(),
                    "1 Gallon": String(row["BC_1G"] || "").trim(),
                    "1 Pail": String(row["BC_Pail"] || "").trim()
                },
                counts: { "1/4 L": 0, "1 L": 0, "1 Gallon": 0, "1 Pail": 0 }
            })).filter(p => p.name);

            document.getElementById('setupBox').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            updateUI();
            forceFocus();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function processBarcode(code) {
        if (!code) return;
        const cleanCode = code.trim();
        let match = false;

        productMatrix.forEach(p => {
            for (let size in p.codes) {
                if (p.codes[size] === cleanCode && cleanCode !== "") {
                    p.counts[size]++;
                    history.unshift({ name: p.name, size: size, code: cleanCode, error: false });
                    match = true;
                }
            }
        });

        if (!match) {
            history.unshift({ name: "Unknown", size: "Unknown", code: cleanCode, error: true });
        }
        updateUI();
    }

    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            processBarcode(input.value);
            input.value = '';
        }
    });

    // --- 3. Resolve Feature ---
    function openResolve(index) {
        pendingResolveIndex = index;
        document.getElementById('unknownDisplay').innerText = "Barcode: " + history[index].code;
        document.getElementById('resolveModal').style.display = 'flex';
        filterResolveList();
    }

    function closeResolve() {
        document.getElementById('resolveModal').style.display = 'none';
    }

    function filterResolveList() {
        const term = document.getElementById('modalSearch').value.toLowerCase();
        const list = document.getElementById('resolveList');
        list.innerHTML = productMatrix
            .filter(p => p.name.toLowerCase().includes(term))
            .slice(0, 10) // Limit results for speed
            .map(p => `
                <div style="border-bottom:1px solid #eee; padding:10px;">
                    <strong>${p.name}</strong><br>
                    <div class="btn-row">
                        ${Object.keys(p.codes).map(size => `
                            <button class="btn-alt" onclick="confirmResolve('${p.name}', '${size}')">${size}</button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
    }

    function confirmResolve(prodName, size) {
        const item = history[pendingResolveIndex];
        const p = productMatrix.find(prod => prod.name === prodName);
        if (p) {
            p.counts[size]++;
            item.name = prodName;
            item.size = size;
            item.error = false;
        }
        closeResolve();
        updateUI();
    }

    // --- 4. Camera ---
    async function toggleCamera() {
        const readerDiv = document.getElementById('reader');
        if (!isCameraRunning) {
            isCameraRunning = true;
            readerDiv.classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                processBarcode(txt);
                html5QrCode.pause();
                setTimeout(() => html5QrCode.resume(), 1500);
            });
        } else {
            await html5QrCode.stop();
            readerDiv.classList.add('hidden');
            isCameraRunning = false;
        }
    }

    function updateUI() {
        feed.innerHTML = history.map((item, idx) => `
            <div class="activity-item" style="border-left: 4px solid ${item.error ? 'var(--apple-red)' : 'var(--apple-green)'}">
                <div style="max-width: 60%;">
                    <strong>${item.name}</strong><br><small>${item.size}</small>
                </div>
                <div class="btn-row" style="margin-top:0">
                    ${item.error ? `<button class="btn-resolve" onclick="openResolve(${idx})">Resolve</button>` : ''}
                    <button class="btn-alt" onclick="undo(${idx})">Undo</button>
                </div>
            </div>
        `).join('');

        const search = document.getElementById('tableSearch').value.toLowerCase();
        document.getElementById('matrixBody').innerHTML = productMatrix
            .filter(p => p.name.toLowerCase().includes(search))
            .map(p => `
                <tr>
                    <td><strong>${p.name}</strong></td>
                    <td class="${p.counts["1/4 L"] > 0 ? 'active-num' : ''}">${p.counts["1/4 L"]}</td>
                    <td class="${p.counts["1 L"] > 0 ? 'active-num' : ''}">${p.counts["1 L"]}</td>
                    <td class="${p.counts["1 Gallon"] > 0 ? 'active-num' : ''}">${p.counts["1 Gallon"]}</td>
                    <td class="${p.counts["1 Pail"] > 0 ? 'active-num' : ''}">${p.counts["1 Pail"]}</td>
                </tr>
            `).join('');
    }

    function undo(idx) {
        const item = history[idx];
        if (!item.error) {
            const p = productMatrix.find(prod => prod.name === item.name);
            if (p) p.counts[item.size]--;
        }
        history.splice(idx, 1);
        updateUI();
    }

    function exportResults() {
        const data = productMatrix.map(p => ({
            "Product": p.name, "1/4L": p.counts["1/4 L"], "1L": p.counts["1 L"], "1G": p.counts["1 Gallon"], "Pail": p.counts["1 Pail"]
        }));
        XLSX.writeFile(XLSX.utils.book_new(), "Inventory.xlsx");
    }

    document.getElementById('tableSearch').addEventListener('input', updateUI);
</script>
</body>
</html>
