<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RC Paint Trading - Pro Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-bg: #F5F5F7;
            --apple-card: rgba(255, 255, 255, 0.8);
            --apple-text: #1D1D1F;
            --apple-secondary: #86868B;
            --apple-border: rgba(210, 210, 215, 0.5);
            --apple-red: #FF3B30;
            --apple-green: #34C759;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 1100px; padding: 20px; }

        .card {
            background: var(--apple-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--apple-border);
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        h1 { font-size: 24px; font-weight: 700; margin: 0 0 5px 0; }
        .subtitle { color: var(--apple-secondary); font-size: 14px; margin-bottom: 20px; }

        /* Scanner Layout */
        .scan-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
        
        #reader { 
            width: 100%; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #000;
            border: none !important;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid var(--apple-border);
            font-size: 16px;
            margin-bottom: 10px;
        }

        /* Activity Feed */
        .activity-feed { height: 300px; overflow-y: auto; }
        .activity-item {
            background: #fff;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .active-num { color: var(--apple-blue); font-weight: 700; background: rgba(0, 122, 255, 0.08); border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 11px; color: var(--apple-secondary); padding: 10px; border-bottom: 1px solid var(--apple-border); text-transform: uppercase; }
        td { padding: 12px 10px; border-bottom: 1px solid var(--apple-border); font-size: 14px; }

        .btn-row { display: flex; gap: 8px; margin-top: 10px; }
        button { padding: 10px 15px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-main { background: var(--apple-blue); color: #fff; }
        .btn-cam { background: var(--apple-green); color: #fff; }
        .btn-alt { background: #E8E8ED; color: var(--apple-text); }

        .hidden { display: none; }
        #dropzone { border: 2px dashed var(--apple-border); padding: 60px; text-align: center; border-radius: 20px; cursor: pointer; }

        @media (max-width: 768px) {
            .scan-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setupBox" class="card">
        <h1>RC Paint Trading</h1>
        <p class="subtitle">Upload Excel to start inventory count.</p>
        <div id="dropzone" onclick="document.getElementById('excelUpload').click()">
            <p style="color: var(--apple-blue); font-weight: 600;">Tap to Upload Spreadsheet</p>
        </div>
        <input type="file" id="excelUpload" class="hidden" accept=".xlsx">
    </div>

    <div id="mainDashboard" class="hidden">
        <div class="scan-grid">
            <div class="card">
                <h1>Input Terminal</h1>
                <div id="scannerStatus" style="font-size: 11px; font-weight: bold; margin-bottom: 10px; color: var(--apple-green);">● HARDWARE SCANNER READY</div>
                
                <div class="btn-row" style="margin-bottom: 15px;">
                    <button id="camToggleBtn" class="btn-cam" onclick="toggleCamera()">Start Camera Scanner</button>
                    <button class="btn-alt" onclick="forceFocus()">Reset Hardware Focus</button>
                </div>
                
                <div id="reader" class="hidden" style="margin-bottom: 15px;"></div>
                
                <div id="manualInputArea">
                    <input type="text" id="barcodeInput" placeholder="Hardware scanner input..." autofocus>
                </div>

                <div class="btn-row">
                    <button class="btn-main" onclick="exportResults()">Export Excel</button>
                    <button class="btn-alt" onclick="location.reload()">Reset App</button>
                </div>
            </div>

            <div class="card">
                <span style="font-size: 12px; font-weight: 700; color: var(--apple-secondary);">LIVE HISTORY</span>
                <div class="activity-feed" id="activityFeed"></div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin:0">Inventory Matrix</h3>
                <input type="text" id="tableSearch" placeholder="Search products..." style="width: 200px; padding: 8px;">
            </div>
            <table>
                <thead>
                    <tr>
                        <th style="width: 40%;">Product Name</th>
                        <th>1/4 L</th>
                        <th>1 L</th>
                        <th>1 Gal</th>
                        <th>Pail</th>
                    </tr>
                </thead>
                <tbody id="matrixBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let productMatrix = [];
    let history = [];
    let html5QrCode = null;
    let isCameraRunning = false;
    const input = document.getElementById('barcodeInput');
    const feed = document.getElementById('activityFeed');
    const statusIndicator = document.getElementById('scannerStatus');

    // --- FIX 1: Force Focus ---
    function forceFocus() {
        input.focus();
        statusIndicator.innerText = "● HARDWARE SCANNER READY";
        statusIndicator.style.color = "var(--apple-green)";
    }

    // Monitor focus to alert user
    input.addEventListener('blur', () => {
        if(!isCameraRunning) {
            statusIndicator.innerText = "○ SCANNER OFF-FOCUS (TAP RESET)";
            statusIndicator.style.color = "var(--apple-red)";
        }
    });

    // --- Core Logic ---

    document.getElementById('excelUpload').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet);

            productMatrix = json.map(row => ({
                name: row.Name || row.name || "Unnamed Item",
                codes: {
                    "1/4 L": String(row["BC_1/4L"] || "").trim(),
                    "1 L": String(row["BC_1L"] || "").trim(),
                    "1 Gallon": String(row["BC_1G"] || "").trim(),
                    "1 Pail": String(row["BC_Pail"] || "").trim()
                },
                counts: { "1/4 L": 0, "1 L": 0, "1 Gallon": 0, "1 Pail": 0 }
            })).filter(p => p.name);

            document.getElementById('setupBox').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            updateUI();
            setTimeout(forceFocus, 500);
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function processBarcode(code) {
        if (!code) return;
        let match = false;
        const cleanCode = code.trim();

        productMatrix.forEach(p => {
            for (let size in p.codes) {
                if (p.codes[size] === cleanCode && cleanCode !== "") {
                    p.counts[size]++;
                    history.unshift({ name: p.name, size: size, error: false });
                    speak(`${p.name}, ${size}`);
                    match = true;
                }
            }
        });

        if (!match) {
            history.unshift({ name: "Unknown Barcode", size: cleanCode, error: true });
            speak("Unknown");
        }
        
        updateUI();
        // --- FIX 2: Ensure focus returns after any scan ---
        if(!isCameraRunning) forceFocus();
    }

    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            processBarcode(input.value);
            input.value = '';
        }
    });

    // --- Camera Functions ---

    async function toggleCamera() {
        const readerDiv = document.getElementById('reader');
        const btn = document.getElementById('camToggleBtn');

        if (!isCameraRunning) {
            isCameraRunning = true;
            readerDiv.classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 15, qrbox: { width: 250, height: 150 } };

            try {
                speak("Camera active");
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    (decodedText) => {
                        processBarcode(decodedText);
                        html5QrCode.pause();
                        setTimeout(() => html5QrCode.resume(), 1500);
                    }
                );
                btn.innerText = "Stop Camera Scanner";
                btn.style.background = "var(--apple-red)";
                statusIndicator.innerText = "● CAMERA MODE ACTIVE";
                statusIndicator.style.color = "var(--apple-blue)";
            } catch (err) {
                isCameraRunning = false;
                alert("Camera error. Use hardware scanner.");
            }
        } else {
            await html5QrCode.stop();
            readerDiv.classList.add('hidden');
            isCameraRunning = false;
            btn.innerText = "Start Camera Scanner";
            btn.style.background = "var(--apple-green)";
            forceFocus();
        }
    }

    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.2;
            window.speechSynthesis.speak(msg);
        }
    }

    function updateUI() {
        feed.innerHTML = history.map((item, idx) => `
            <div class="activity-item" style="border-left: 4px solid ${item.error ? 'var(--apple-red)' : 'var(--apple-green)'}">
                <div>
                    <strong>${item.name}</strong><br>
                    <small>${item.size}</small>
                </div>
                <button class="btn-alt" onclick="undo(${idx})" style="padding:5px 10px; font-size:10px;">Undo</button>
            </div>
        `).join('');

        const search = document.getElementById('tableSearch').value.toLowerCase();
        document.getElementById('matrixBody').innerHTML = productMatrix
            .filter(p => p.name.toLowerCase().includes(search))
            .map(p => `
                <tr>
                    <td><strong>${p.name}</strong></td>
                    <td class="${p.counts["1/4 L"] > 0 ? 'active-num' : ''}">${p.counts["1/4 L"]}</td>
                    <td class="${p.counts["1 L"] > 0 ? 'active-num' : ''}">${p.counts["1 L"]}</td>
                    <td class="${p.counts["1 Gallon"] > 0 ? 'active-num' : ''}">${p.counts["1 Gallon"]}</td>
                    <td class="${p.counts["1 Pail"] > 0 ? 'active-num' : ''}">${p.counts["1 Pail"]}</td>
                </tr>
            `).join('');
    }

    function undo(index) {
        const item = history[index];
        if (!item.error) {
            const p = productMatrix.find(prod => prod.name === item.name);
            if (p) p.counts[item.size]--;
        }
        history.splice(index, 1);
        updateUI();
        forceFocus();
    }

    function exportResults() {
        const data = productMatrix.map(p => ({
            "Product": p.name,
            "1/4L": p.counts["1/4 L"],
            "1L": p.counts["1 L"],
            "1 Gallon": p.counts["1 Gallon"],
            "Pail": p.counts["1 Pail"]
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Inventory");
        XLSX.writeFile(wb, "Inventory_Count.xlsx");
    }

    document.getElementById('tableSearch').addEventListener('input', updateUI);
</script>

</body>
</html>
